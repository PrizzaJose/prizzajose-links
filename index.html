<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrizzaJose Links</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #0a0a0a 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
    min-height: 100vh;
  }

  .profile-pic {
    margin-top: 50px;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #d6bfa7;
    box-shadow: 0 0 25px rgba(214, 191, 167, 0.5);
  }

  h1 {
    margin: 20px 0 30px 0;
    font-size: 2.2em;
    font-weight: 800;
    letter-spacing: 1px;
  }

  .link-button {
    display: block;
    width: 85%;
    max-width: 420px;
    margin: 12px auto;
    padding: 16px;
    font-size: 1.1em;
    text-align: center;
    background: #111;
    color: #fff;
    text-decoration: none;
    border-radius: 14px;
    border: 1px solid #222;
    transition: all 0.25s ease;
  }

  .link-button:hover {
    background: linear-gradient(135deg, #d6bfa7, #b89b7a);
    transform: scale(1.04);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }

</style>
</head>

<body>

<!-- FOTO -->
<img class="profile-pic" src="TU_IMAGEN_AQUI.jpg" alt="PrizzaJose">

<h1>PrizzaJose</h1>

<!-- LINKS -->
<a class="link-button" href="https://instagram.com/PrizzaJose" target="_blank">Instagram</a>
<a class="link-button" href="https://youtube.com/@PrizzaJose" target="_blank">YouTube</a>
<a class="link-button" href="https://twitter.com/PrizzaJose" target="_blank">Twitter</a>
<a class="link-button" href="https://tiktok.com/@PrizzaJose" target="_blank">TikTok</a>

</body>
</html>
